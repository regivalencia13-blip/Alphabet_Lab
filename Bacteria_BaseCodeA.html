<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bacteria_BaseCodeA</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #f8f8f8;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        width: min(100vw, 100vh);
        height: min(100vw, 100vh);
      }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script>
      //Bacteria_BaseCodeA_레기나

      let simW = 160;
      let simH = 160;

      let grid = [];
      let next = [];

      let dA = 1.0;
      let dB = 0.45;
      let feed = 0.055;
      let kill = 0.064;
      let loopFrames = 720;
      let backgroundDrops = [];

      function setup() {
        createCanvas(400, 400);
        pixelDensity(1);

        initGrid();
        initBackgroundDrops();
        seedRandomColonies();
      }

      function draw() {
        background(248);

        for (let i = 0; i < 3; i++) {
          updateReaction();
        }

        let phase = (frameCount % loopFrames) / loopFrames;
        let transfer = dropletTransferPulse(phase);
        let burst = suddenMiddleBurst(phase);

        thinLiquid(0.0035 + burst * 0.003);
        animateBackgroundDrops(phase, transfer, burst);
        keepCenterAlive(phase, transfer, burst);
        exchangeOilDroplets(phase, transfer, burst);

        if (frameCount > 70) {
          guideLiquidIntoA(transfer * 0.56);
        }

        if (transfer < 0.08 || phase > 0.86) {
          eraseA(0.035);
        }

        // when the letter loosens, split the liquid back into soft moving colonies
        if (transfer < 0.24 && frameCount % 12 === 0) {
          seedSmallRandomColony();
        }

        if (frameCount % 210 === 0) {
          breakOuterFungi();
        }

        drawResult();
        drawFrame();
      }

      function initGrid() {
        grid = [];
        next = [];

        for (let x = 0; x < simW; x++) {
          grid[x] = [];
          next[x] = [];

          for (let y = 0; y < simH; y++) {
            grid[x][y] = { a: 1, b: 0 };
            next[x][y] = { a: 1, b: 0 };
          }
        }
      }

      function seedRandomColonies() {
        for (let i = 0; i < 78; i++) {
          let x = floor(random(18, simW - 18));
          let y = floor(random(18, simH - 18));
          let r = floor(random(3, 6));

          addSoftCircle(x, y, r, 0.9);
        }
      }

      function seedSmallRandomColony() {
        let a = random(TWO_PI);
        let r = sqrt(random()) * 65;

        let x = floor(simW / 2 + cos(a) * r);
        let y = floor(simH / 2 + sin(a) * r);

        addSoftCircle(x, y, floor(random(2, 4)), 0.25);
      }

      function initBackgroundDrops() {
        backgroundDrops = [];

        for (let i = 0; i < 54; i++) {
          let a = random(TWO_PI);
          let r = sqrt(random()) * 76;

          backgroundDrops.push({
            x: simW / 2 + cos(a) * r,
            y: simH / 2 + sin(a) * r,
            radius: random(2.6, 4.8),
            angle: random(TWO_PI),
            seed: random(1000),
            active: random() > 0.42,
          });
        }
      }

      function guideLiquidIntoA(amount) {
        let strength = 0.024 * amount;

        guideDottedLine(48, 135, 80, 35, 3, strength);
        guideDottedLine(112, 135, 80, 35, 3, strength);
        guideDottedLine(62, 92, 98, 92, 2, strength);

        // when retracting, weaken A area slightly
        if (amount < 0.08) {
          eraseA(0.04);
        }
      }

      function breakOuterFungi() {
        for (let i = 0; i < 14; i++) {
          let a = random(TWO_PI);
          let r = random(55, 78);

          let x = floor(simW / 2 + cos(a) * r);
          let y = floor(simH / 2 + sin(a) * r);

          weakenCircle(x, y, floor(random(4, 8)), 0.13);
        }

        for (let i = 0; i < 6; i++) {
          seedSmallRandomColony();
        }
      }

      function exchangeOilDroplets(phase, transfer, burst) {
        let pairs = [
          [42, 118, 80, 42, 0.00],
          [118, 118, 80, 42, 0.21],
          [50, 88, 110, 88, 0.43],
          [38, 64, 122, 116, 0.62],
          [122, 64, 38, 116, 0.79],
        ];

        let amount = 0.024 + burst * 0.032;

        for (let i = 0; i < pairs.length; i++) {
          let p = pairs[i];
          let snap = snapWindow(phase, p[4]);
          let travel = suddenTransferTravel(phase, p[4]);
          let x = lerp(p[0], p[2], travel);
          let y = lerp(p[1], p[3], travel);
          let angle = atan2(p[3] - p[1], p[2] - p[0]);
          let wobble = sin(frameCount * 0.035 + i * 2.1) * (1.4 + burst * 2.4 + snap * 7.0);
          let px = floor(x + cos(angle + HALF_PI) * wobble);
          let py = floor(y + sin(angle + HALF_PI) * wobble);
          let radius = floor(2.8 + transfer * 1.1 + burst * 1.1 + snap * 1.4 + sin(frameCount * 0.035 + i) * 0.7);

          guideLine(p[0], p[1], p[2], p[3], 1, amount * 0.045);
          addSoftCircle(px, py, radius, amount + snap * 0.035);

          if (snap > 0.05) {
            addSoftEllipse(
              px - cos(angle) * snap * 7,
              py - sin(angle) * snap * 7,
              3.8 + snap * 9.0,
              1.2 + snap * 0.8,
              angle,
              amount * snap * 1.45
            );
          }

          if (burst > 0.25 || snap > 0.2) {
            let split = sin(travel * PI);
            let ox = cos(angle + HALF_PI) * (3 + split * 5 + snap * 4);
            let oy = sin(angle + HALF_PI) * (3 + split * 5 + snap * 4);
            addSoftCircle(floor(px + ox), floor(py + oy), 2, amount * split + snap * 0.02);
            addSoftCircle(floor(px - ox), floor(py - oy), 2, amount * split + snap * 0.02);
          }
        }
      }

      function keepCenterAlive(phase, transfer, burst) {
        let amount = 0.024 + transfer * 0.018 + burst * 0.012;

        for (let i = 0; i < 24; i++) {
          let seed = i * 37.17;
          let a = seed + sin(frameCount * 0.012 + i) * 0.8;
          let r = 8 + (i % 6) * 4.4 + sin(frameCount * 0.017 + seed) * 2.2;
          let x = floor(simW / 2 + cos(a) * r * 0.72);
          let y = floor(simH / 2 + sin(a * 1.13) * r);
          let stretch = smoothstep(0.2, 0.34, wrap01(phase + i * 0.071)) -
            smoothstep(0.43, 0.7, wrap01(phase + i * 0.071));

          if (stretch > 0.05 && i % 3 === 0) {
            addSoftEllipse(x, y, 3.6 + stretch * 5.2, 1.8, a, amount);
          } else {
            addSoftCircle(x, y, 2, amount);
          }
        }
      }

      function animateBackgroundDrops(phase, transfer, burst) {
        for (let i = 0; i < backgroundDrops.length; i++) {
          let dot = backgroundDrops[i];
          let pulse = wrap01(phase * 0.72 + dot.seed);
          let stretch = dot.active ? smoothstep(0.18, 0.33, pulse) - smoothstep(0.43, 0.66, pulse) : 0;
          let drift = sin(frameCount * 0.018 + dot.seed * TWO_PI) * 1.2;
          let x = dot.x + cos(dot.angle + HALF_PI) * drift;
          let y = dot.y + sin(dot.angle + HALF_PI) * drift;
          let amount = 0.034 + transfer * 0.016 + burst * 0.012;

          if (stretch > 0.03) {
            let length = dot.radius * (1.6 + stretch * 3.7);
            let thickness = dot.radius * (0.82 - stretch * 0.34);
            addSoftEllipse(x, y, length, thickness, dot.angle, amount);
          } else {
            addSoftCircle(floor(x), floor(y), floor(dot.radius), amount * 1.2);
          }
        }
      }

      function thinLiquid(amount) {
        for (let x = 1; x < simW - 1; x++) {
          for (let y = 1; y < simH - 1; y++) {
            let dx = x - simW / 2;
            let dy = y - simH / 2;
            let outside = constrain((sqrt(dx * dx + dy * dy) - 34) / 42, 0, 1);
            let local = amount * (0.45 + outside * 0.85);

            grid[x][y].b = constrain(grid[x][y].b - local, 0, 1);
            grid[x][y].a = constrain(grid[x][y].a + local * 0.65, 0, 1);
          }
        }
      }

      function guideDottedLine(x1, y1, x2, y2, thickness, strength) {
        let steps = 28;

        for (let i = 0; i < steps; i++) {
          let p = i / (steps - 1);

          let x = floor(lerp(x1, x2, p));
          let y = floor(lerp(y1, y2, p));

          // gap between bacteria colonies
          if (i % 2 === 0) {
            addSoftCircle(x, y, thickness + 1, strength * 1.4);
          }
        }
      }

      function eraseA(amount) {
        weakenLine(48, 135, 80, 35, 8, amount);
        weakenLine(112, 135, 80, 35, 8, amount);
        weakenLine(62, 92, 98, 92, 6, amount);
      }

      function weakenLine(x1, y1, x2, y2, thickness, amount) {
        let steps = 100;

        for (let i = 0; i < steps; i++) {
          let p = i / (steps - 1);

          let x = floor(lerp(x1, x2, p));
          let y = floor(lerp(y1, y2, p));

          weakenCircle(x, y, thickness, amount);
        }
      }

      function weakenCircle(cx, cy, r, amount) {
        for (let dx = -r; dx <= r; dx++) {
          for (let dy = -r; dy <= r; dy++) {
            let x = cx + dx;
            let y = cy + dy;

            if (x >= 0 && x < simW && y >= 0 && y < simH) {
              let d = sqrt(dx * dx + dy * dy);

              if (d <= r) {
                let falloff = 1 - d / r;
                grid[x][y].b = constrain(grid[x][y].b - amount * falloff, 0, 1);
                grid[x][y].a = constrain(grid[x][y].a + amount * falloff, 0, 1);
              }
            }
          }
        }
      }

      function guideLine(x1, y1, x2, y2, thickness, strength) {
        let steps = 100;

        for (let i = 0; i < steps; i++) {
          let p = i / (steps - 1);

          let x = floor(lerp(x1, x2, p));
          let y = floor(lerp(y1, y2, p));

          addSoftCircle(x, y, thickness, strength);
        }
      }

      function addSoftCircle(cx, cy, r, amount) {
        for (let dx = -r; dx <= r; dx++) {
          for (let dy = -r; dy <= r; dy++) {
            let x = cx + dx;
            let y = cy + dy;

            if (x >= 0 && x < simW && y >= 0 && y < simH) {
              let d = sqrt(dx * dx + dy * dy);

              if (d <= r) {
                let falloff = 1 - d / r;
                grid[x][y].b = constrain(grid[x][y].b + amount * falloff, 0, 1);
                grid[x][y].a = constrain(grid[x][y].a - amount * 0.35 * falloff, 0, 1);
              }
            }
          }
        }
      }

      function addSoftEllipse(cx, cy, rx, ry, angle, amount) {
        let bound = ceil(max(rx, ry)) + 1;
        let ca = cos(angle);
        let sa = sin(angle);

        for (let dx = -bound; dx <= bound; dx++) {
          for (let dy = -bound; dy <= bound; dy++) {
            let x = floor(cx + dx);
            let y = floor(cy + dy);

            if (x >= 0 && x < simW && y >= 0 && y < simH) {
              let lx = dx * ca + dy * sa;
              let ly = -dx * sa + dy * ca;
              let d = sqrt((lx * lx) / (rx * rx) + (ly * ly) / (ry * ry));

              if (d <= 1) {
                let falloff = 1 - d;
                grid[x][y].b = constrain(grid[x][y].b + amount * falloff, 0, 1);
                grid[x][y].a = constrain(grid[x][y].a - amount * 0.32 * falloff, 0, 1);
              }
            }
          }
        }
      }

      function updateReaction() {
        for (let x = 1; x < simW - 1; x++) {
          for (let y = 1; y < simH - 1; y++) {
            let a = grid[x][y].a;
            let b = grid[x][y].b;

            let reaction = a * b * b;

            let newA =
              a +
              dA * laplaceA(x, y) -
              reaction +
              feed * (1 - a);

            let newB =
              b +
              dB * laplaceB(x, y) +
              reaction -
              (kill + feed) * b;

            next[x][y].a = constrain(newA, 0, 1);
            next[x][y].b = constrain(newB, 0, 1);
          }
        }

        let temp = grid;
        grid = next;
        next = temp;
      }

      function laplaceA(x, y) {
        let sum = 0;

        sum += grid[x][y].a * -1;
        sum += grid[x - 1][y].a * 0.2;
        sum += grid[x + 1][y].a * 0.2;
        sum += grid[x][y - 1].a * 0.2;
        sum += grid[x][y + 1].a * 0.2;

        sum += grid[x - 1][y - 1].a * 0.05;
        sum += grid[x + 1][y - 1].a * 0.05;
        sum += grid[x - 1][y + 1].a * 0.05;
        sum += grid[x + 1][y + 1].a * 0.05;

        return sum;
      }

      function laplaceB(x, y) {
        let sum = 0;

        sum += grid[x][y].b * -1;
        sum += grid[x - 1][y].b * 0.2;
        sum += grid[x + 1][y].b * 0.2;
        sum += grid[x][y - 1].b * 0.2;
        sum += grid[x][y + 1].b * 0.2;

        sum += grid[x - 1][y - 1].b * 0.05;
        sum += grid[x + 1][y - 1].b * 0.05;
        sum += grid[x - 1][y + 1].b * 0.05;
        sum += grid[x + 1][y + 1].b * 0.05;

        return sum;
      }

      function drawResult() {
        loadPixels();

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            let sx = floor(map(x, 0, width, 0, simW));
            let sy = floor(map(y, 0, height, 0, simH));

            sx = constrain(sx, 0, simW - 1);
            sy = constrain(sy, 0, simH - 1);

            let dx = x - width / 2;
            let dy = y - height / 2;
            let insideCircle = dx * dx + dy * dy < 182 * 182;

            let b = grid[sx][sy].b;

            let col = 248;

            if (b > 0.28 && b < 0.40 && insideCircle) {
              col = 0;
            }

            let index = (x + y * width) * 4;
            pixels[index + 0] = col;
            pixels[index + 1] = col;
            pixels[index + 2] = col;
            pixels[index + 3] = 255;
          }
        }

        updatePixels();
      }

      function drawFrame() {
        noFill();
        stroke(0);
        strokeWeight(2);
        circle(width / 2, height / 2, 365);
      }

      function smoothstep(edge0, edge1, x) {
        x = constrain((x - edge0) / (edge1 - edge0), 0, 1);
        return x * x * (3 - 2 * x);
      }

      function dropletTransferPulse(phase) {
        let rise = smoothstep(0.12, 0.28, phase);
        let fall = smoothstep(0.62, 0.9, phase);
        return constrain(rise - fall, 0, 1);
      }

      function suddenMiddleBurst(phase) {
        let inBurst = smoothstep(0.355, 0.382, phase);
        let outBurst = smoothstep(0.405, 0.48, phase);
        return constrain(inBurst - outBurst, 0, 1);
      }

      function suddenTransferTravel(phase, offset) {
        let x = wrap01(phase + offset);

        if (x < 0.36) {
          return 0.06 + dropletEase(x / 0.36) * 0.12;
        }

        if (x < 0.398) {
          return 0.18 + dropletEase((x - 0.36) / 0.038) * 0.72;
        }

        return 0.9 - dropletEase((x - 0.398) / 0.602) * 0.84;
      }

      function snapWindow(phase, offset) {
        let x = wrap01(phase + offset);
        let attack = smoothstep(0.355, 0.375, x);
        let release = smoothstep(0.395, 0.43, x);

        return constrain(attack - release, 0, 1);
      }

      function dropletEase(x) {
        let slowFastSlow = x < 0.5
          ? 4 * x * x * x
          : 1 - pow(-2 * x + 2, 3) / 2;

        return slowFastSlow;
      }

      function wrap01(value) {
        return ((value % 1) + 1) % 1;
      }
    </script>
  </body>
</html>

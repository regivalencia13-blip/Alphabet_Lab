<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bacteria_BaseCodeA_Combined</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f8f8f8;
        color: #111;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      main {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 280px));
        justify-content: center;
        align-items: center;
        gap: 56px;
        width: min(100%, 700px);
      }

      section {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        justify-items: center;
        min-width: 0;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .preview {
        width: 280px;
        height: 280px;
        max-width: 100%;
        overflow: hidden;
      }

      iframe {
        display: block;
        width: 400px;
        height: 400px;
        border: 0;
        background: #f8f8f8;
        overflow: hidden;
        transform: scale(0.7);
        transform-origin: top left;
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }

        main {
          grid-template-columns: 1fr;
          width: min(100%, 300px);
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Side-by-side bacteria sketch comparison">
      <section>
        <h1>Pixel</h1>
        <div class="preview">
          <iframe src="Bacteria_BaseCodeA.html" title="Pixel bacteria sketch"></iframe>
        </div>
      </section>
      <section>
        <h1>Liquid Texture</h1>
        <div class="preview">
          <iframe src="Bacteria_BaseCodeA+Texture.html" title="Liquid texture bacteria sketch"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
